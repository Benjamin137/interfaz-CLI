<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Grid con personaje</title>

<style>

body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
}

#controls{
    position:fixed;
    top:10px;
    left:10px;
    z-index:10;
    background:white;
    padding:10px;
}

#grid{
    display:grid;
}

.cell{
    display:flex;
    align-items:center;
    justify-content:center;
}

.show-borders .cell{
    border:1px solid #999;
}

.player{
    width:100%;
    height:100%;
    object-fit:contain;
}

</style>
</head>

<body>

<div id="controls">
    <button id="toggleBorders">Bordes</button>
    <button id="increaseSize">+</button>
    <button id="decreaseSize">-</button>
</div>

<div id="grid"></div>

<script src="index.js"></script>
</body>
</html>
